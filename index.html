<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Abdulloh Ashurov Assistant is a private, local-first desktop AI copilot for meetings, interviews, and focused work."
  />
  <meta name="theme-color" content="#111827" />
  <title>Abdulloh Ashurov Assistant</title>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com https://api.groq.com https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://campaign-sand.vercel.app; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
</head>

<body style="background-color: transparent; margin: 0; overflow: hidden;">
  <!-- Synchronously apply cached theme before any render — prevents flash/mixed theme -->
  <script>
    try {
      var t = localStorage.getItem('natively_resolved_theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
